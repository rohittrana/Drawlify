version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: drawapp_postgres
    restart: always
    environment:
      POSTGRES_USER: drawapp
      POSTGRES_PASSWORD: drawapp123
      POSTGRES_DB: drawapp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: drawapp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: